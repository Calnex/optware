set default=0

set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /isolinux/splash.png ]; then
    # binary_syslinux modifies the theme file to point to the correct
    # background picture
    set theme=/boot/grub/live-theme/theme.txt
elif [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1
set timeout=5

# Note: /live/vmlinuz and /live/initrd.img are symlinks created by
# the 0960-create-kernel-symlinks.hook.binary script during build

# Live boot (primary - uses symlinks)
menuentry --hotkey=b 'Calnex system' {
	search --set=root --file /live/vmlinuz
	linux	/live/vmlinuz boot=live components live-media-path=live ignore_uuid quiet splash \
            persistence persistence-label=persistence \
            noeject swap=true console=ttyS0,115200n8 locales=en_GB.UTF-8
	initrd	/live/initrd.img
}

# Live boot (debug - enables live-boot tracing into /boot.log)
menuentry 'Calnex system (debug)' {
	search --set=root --file /live/vmlinuz
	linux	/live/vmlinuz boot=live components live-media-path=live ignore_uuid debug \
            persistence persistence-label=persistence \
            noeject swap=true console=ttyS0,115200n8 locales=en_GB.UTF-8
	initrd	/live/initrd.img
}

# Fallback boot entry (uses versioned kernel files directly)
menuentry 'Calnex system (fallback)' {
	search --set=root --file /live/filesystem.squashfs
	# Use glob to find kernel - GRUB will use the first match
	for kernel in /live/vmlinuz-*; do
		if [ -f "$kernel" ]; then
			regexp --set=1:kver "vmlinuz-(.*)" "$kernel"
			linux	$kernel boot=live components live-media-path=live ignore_uuid quiet splash \
                    persistence persistence-label=persistence \
                    noeject swap=true console=ttyS0,115200n8 locales=en_GB.UTF-8
			initrd	/live/initrd.img-$kver
			break
		fi
	done
}
